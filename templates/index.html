<!DOCTYPE html>

<html>

<head>

<title>ICICI Illustration</title>


<style>

body{

background:linear-gradient(135deg,#061b35,#154c79);

font-family:Arial;

color:white;

}


.card{

width:900px;

margin:50px auto;

padding:35px;

background:#ffffff20;

backdrop-filter:blur(15px);

border-radius:25px;

animation:show 1s;

}


input{

padding:12px;

margin:8px;

border-radius:10px;

border:none;

width:150px;

}


button{

background:#ffca05;

border:none;

padding:12px 25px;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}



.result{

background:white;

color:black;

padding:25px;

border-radius:20px;

margin-top:30px;

}



td{

padding:10px;

}


@keyframes show{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

}

}


</style>


</head>


<body>


<div class="card">


<h1 style="color:#ffca05">

ICICI PRU SIGNATURE PENSION PLAN

</h1>


<h2>

Policy Illustration Calculator

</h2>



<form method="post">


Policyholder Age 

<input name="age" required>



Wife Age

<input name="wife_age" required>



<br>


Monthly Premium

<input name="premium" value=" ">



Payment Term

<input name="payment" value=" ">



<br>


Policy Term

<input name="policy" value=" ">



Return %

<input name="rate" value=" ">



<br>


<button>

Calculate

</button>


</form>




{% if data %}


<div class="result">


<h2>

Illustration

</h2>



<table>


{% for k,v in data.items() %}


<tr>

<td>{{k}}</td>

<td><b>{{v}}</b></td>


</tr>


{% endfor %}


</table>




<form action="/excel" method="post">


<input type="hidden" name="age" value="{{request.form.age}}">

<input type="hidden" name="wife_age" value="{{request.form.wife_age}}">

<input type="hidden" name="premium" value="{{request.form.premium}}">

<input type="hidden" name="payment" value="{{request.form.payment}}">

<input type="hidden" name="policy" value="{{request.form.policy}}">

<input type="hidden" name="rate" value="{{request.form.rate}}">


<button>

Download Excel Illustration

</button>


</form>



</div>


{% endif %}



</div>


</body>


</html>
